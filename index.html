<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://googleads.g.doubleclick.net; frame-src https://googleads.g.doubleclick.net;">
  <meta name="google-adsense-account" content="ca-pub-4220344666459128">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4220344666459128" crossorigin="anonymous"></script>
  <title>복불복 게임 🎰</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-toggle">
  <button id="themeBtn" class="btn-theme" title="테마 변경">☀️</button>
</div>

<h1>🎰 복불복 게임</h1>
<p class="subtitle">운명의 룰렛을 돌려라! 누가 걸릴까?</p>

<div class="container">

  <!-- 참가자 패널 -->
  <div class="panel players-panel">
    <h2>👥 참가자</h2>
    <div class="input-row">
      <input id="playerInput" type="text" placeholder="이름 입력..." maxlength="8" />
      <button id="addPlayerBtn" class="btn btn-add">추가</button>
    </div>
    <ul class="player-list" id="playerList">
      <li class="empty-msg" id="emptyPlayers">참가자를 추가하세요</li>
    </ul>
  </div>

  <!-- 룰렛 휠 -->
  <div class="wheel-panel">
    <div class="wheel-wrapper">
      <div class="wheel-arrow"></div>
      <canvas id="wheel" width="340" height="340"></canvas>
      <div class="wheel-center"></div>
    </div>
    <button class="spin-btn" id="spinBtn">SPIN!</button>
  </div>

  <!-- 벌칙 패널 -->
  <div class="panel penalty-panel">
    <h2>⚡ 벌칙/미션</h2>
    <div class="input-row">
      <input id="penaltyInput" type="text" placeholder="벌칙 입력..." maxlength="20" />
      <button id="addPenaltyBtn" class="btn btn-add">추가</button>
    </div>
    <ul class="penalty-list" id="penaltyList">
      <li class="empty-msg" id="emptyPenalties">벌칙을 추가하세요</li>
    </ul>
  </div>

</div>

<!-- 결과 모달 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="modal-emoji" id="resultEmoji">😱</div>
    <div class="modal-title" id="resultTitle">걸렸다!</div>
    <div class="modal-winner" id="resultWinner"></div>
    <div class="modal-penalty" id="resultPenalty"></div>
    <button id="closeModalBtn" class="modal-close">확인!</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script src="main.js"></script>

</body>
</html>
