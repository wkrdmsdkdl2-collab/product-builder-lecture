<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복불복 게임 🎰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    .subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 30px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
    }

    /* --- 참가자 패널 --- */
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .players-panel {
      flex: 1;
      min-width: 260px;
      max-width: 320px;
    }

    .panel h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #ffd200;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .input-row input:focus { border-color: #ffd200; }
    .input-row input::placeholder { color: #888; }

    .btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      transition: all 0.2s;
    }

    .btn-add {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #222;
    }

    .btn-add:hover { transform: scale(1.05); }

    .player-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .player-list::-webkit-scrollbar { width: 4px; }
    .player-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .player-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .player-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .player-name { flex: 1; font-size: 0.95rem; }

    .btn-remove {
      background: rgba(255,80,80,0.2);
      color: #ff6b6b;
      border: none;
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }

    .btn-remove:hover { background: rgba(255,80,80,0.4); }

    /* --- 벌칙 패널 --- */
    .penalty-panel {
      flex: 1;
      min-width: 260px;
      max-width: 320px;
    }

    .penalty-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .penalty-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      animation: slideIn 0.3s ease;
    }

    .penalty-text { flex: 1; font-size: 0.9rem; }

    /* --- 룰렛 휠 --- */
    .wheel-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .wheel-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
    }

    .wheel-arrow {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 30px solid #ffd200;
      filter: drop-shadow(0 2px 6px rgba(255,210,0,0.7));
      z-index: 10;
    }

    canvas#wheel {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255,210,0,0.3), 0 0 80px rgba(255,210,0,0.1);
    }

    .wheel-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 50px; height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 30%, #ffd200 100%);
      box-shadow: 0 0 20px rgba(255,210,0,0.8);
      z-index: 5;
    }

    .spin-btn {
      width: 200px;
      padding: 16px;
      font-size: 1.3rem;
      border-radius: 50px;
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 2px;
      box-shadow: 0 6px 30px rgba(233,69,96,0.5);
      transition: all 0.2s;
    }

    .spin-btn:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 10px 40px rgba(233,69,96,0.7);
    }

    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* --- 결과 모달 --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .modal-emoji { font-size: 4rem; margin-bottom: 12px; }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .modal-winner {
      font-size: 2.2rem;
      font-weight: 900;
      margin: 12px 0;
    }

    .modal-penalty {
      font-size: 1.1rem;
      color: #ccc;
      margin-bottom: 24px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
    }

    .modal-close {
      padding: 12px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #222;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .modal-close:hover { transform: scale(1.05); }

    /* 축하 파티클 */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .empty-msg {
      color: #666;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .wheel-wrapper { width: 280px; height: 280px; }
      canvas#wheel { width: 280px; height: 280px; }
    }
  </style>
</head>
<body>

<h1>🎰 복불복 게임</h1>
<p class="subtitle">운명의 룰렛을 돌려라! 누가 걸릴까?</p>

<div class="container">

  <!-- 참가자 패널 -->
  <div class="panel players-panel">
    <h2>👥 참가자</h2>
    <div class="input-row">
      <input id="playerInput" type="text" placeholder="이름 입력..." maxlength="8" />
      <button class="btn btn-add" onclick="addPlayer()">추가</button>
    </div>
    <ul class="player-list" id="playerList">
      <li class="empty-msg" id="emptyPlayers">참가자를 추가하세요</li>
    </ul>
  </div>

  <!-- 룰렛 휠 -->
  <div class="wheel-panel">
    <div class="wheel-wrapper">
      <div class="wheel-arrow"></div>
      <canvas id="wheel" width="340" height="340"></canvas>
      <div class="wheel-center"></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN!</button>
  </div>

  <!-- 벌칙 패널 -->
  <div class="panel penalty-panel">
    <h2>⚡ 벌칙/미션</h2>
    <div class="input-row">
      <input id="penaltyInput" type="text" placeholder="벌칙 입력..." maxlength="20" />
      <button class="btn btn-add" onclick="addPenalty()">추가</button>
    </div>
    <ul class="penalty-list" id="penaltyList">
      <li class="empty-msg" id="emptyPenalties">벌칙을 추가하세요</li>
    </ul>
  </div>

</div>

<!-- 결과 모달 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="modal-emoji" id="resultEmoji">😱</div>
    <div class="modal-title" id="resultTitle">걸렸다!</div>
    <div class="modal-winner" id="resultWinner"></div>
    <div class="modal-penalty" id="resultPenalty"></div>
    <button class="modal-close" onclick="closeModal()">확인!</button>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
  // ─── 데이터 ───────────────────────────────────────────────────
  const COLORS = [
    '#e94560','#f7971e','#2ecc71','#3498db',
    '#9b59b6','#e67e22','#1abc9c','#e74c3c',
    '#f39c12','#16a085','#8e44ad','#d35400',
  ];

  let players  = ['홍길동','김철수','이영희'];
  let penalties = ['원샷!','춤 추기','노래 한 곡','만원 내기','罰酒 3잔','닭발 먹기'];
  let isSpinning = false;
  let currentAngle = 0;

  // ─── 참가자 ───────────────────────────────────────────────────
  function addPlayer() {
    const input = document.getElementById('playerInput');
    const name  = input.value.trim();
    if (!name) return;
    players.push(name);
    input.value = '';
    renderPlayers();
    drawWheel();
  }

  function removePlayer(i) {
    players.splice(i, 1);
    renderPlayers();
    drawWheel();
  }

  function renderPlayers() {
    const list  = document.getElementById('playerList');
    const empty = document.getElementById('emptyPlayers');
    if (players.length === 0) {
      list.innerHTML = '<li class="empty-msg" id="emptyPlayers">참가자를 추가하세요</li>';
      return;
    }
    list.innerHTML = players.map((p, i) => `
      <li class="player-item">
        <span class="player-dot" style="background:${COLORS[i % COLORS.length]}"></span>
        <span class="player-name">${escHtml(p)}</span>
        <button class="btn-remove" onclick="removePlayer(${i})">✕</button>
      </li>
    `).join('');
  }

  // ─── 벌칙 ────────────────────────────────────────────────────
  function addPenalty() {
    const input = document.getElementById('penaltyInput');
    const text  = input.value.trim();
    if (!text) return;
    penalties.push(text);
    input.value = '';
    renderPenalties();
  }

  function removePenalty(i) {
    penalties.splice(i, 1);
    renderPenalties();
  }

  function renderPenalties() {
    const list = document.getElementById('penaltyList');
    if (penalties.length === 0) {
      list.innerHTML = '<li class="empty-msg">벌칙을 추가하세요</li>';
      return;
    }
    list.innerHTML = penalties.map((p, i) => `
      <li class="penalty-item">
        <span class="penalty-text">⚡ ${escHtml(p)}</span>
        <button class="btn-remove" onclick="removePenalty(${i})">✕</button>
      </li>
    `).join('');
  }

  // ─── 룰렛 그리기 ─────────────────────────────────────────────
  function drawWheel(highlightIdx = -1) {
    const canvas = document.getElementById('wheel');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2, r = cx - 6;

    ctx.clearRect(0, 0, W, H);

    if (players.length === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('참가자를 추가하세요', cx, cy);
      return;
    }

    const slice = (Math.PI * 2) / players.length;

    players.forEach((name, i) => {
      const startAngle = currentAngle + slice * i - Math.PI / 2;
      const endAngle   = startAngle + slice;
      const color      = COLORS[i % COLORS.length];

      // 부채꼴
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.closePath();
      ctx.fillStyle = highlightIdx === i ? '#fff' : color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 텍스트
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAngle + slice / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = highlightIdx === i ? color : '#fff';
      ctx.font = `bold ${players.length > 8 ? 13 : 16}px sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillText(name, r - 14, 5);
      ctx.restore();
    });

    // 테두리 원
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // ─── 스핀 ────────────────────────────────────────────────────
  function spin() {
    if (isSpinning || players.length < 2) {
      if (players.length < 2) alert('참가자를 2명 이상 추가하세요!');
      return;
    }

    isSpinning = true;
    document.getElementById('spinBtn').disabled = true;

    const totalRotation = (Math.PI * 2) * (5 + Math.random() * 5);
    const duration      = 3500 + Math.random() * 1500;
    const startAngle    = currentAngle;
    const startTime     = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed  = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      currentAngle   = startAngle + totalRotation * easeOut(progress);

      drawWheel();

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;

        // 결과 계산: 화살표는 위쪽(-π/2), 그게 몇 번째 슬라이스?
        const slice = (Math.PI * 2) / players.length;
        // 정규화
        let normalizedAngle = ((-(currentAngle) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        let winnerIdx = Math.floor(normalizedAngle / slice) % players.length;

        drawWheel(winnerIdx);
        showResult(winnerIdx);
      }
    }

    requestAnimationFrame(animate);
  }

  // ─── 결과 표시 ───────────────────────────────────────────────
  function showResult(winnerIdx) {
    const winner  = players[winnerIdx];
    const penalty = penalties.length > 0
      ? penalties[Math.floor(Math.random() * penalties.length)]
      : '벌칙 없음 (럭키~!)';

    const isBad   = penalties.length > 0;
    document.getElementById('resultEmoji').textContent   = isBad ? '😱' : '🎉';
    document.getElementById('resultTitle').textContent   = isBad ? '당첨! 걸렸다!!' : '선택됨!';
    document.getElementById('resultWinner').textContent  = winner;
    document.getElementById('resultWinner').style.color  = COLORS[winnerIdx % COLORS.length];
    document.getElementById('resultPenalty').textContent = `🎯 ${penalty}`;

    document.getElementById('resultModal').classList.add('show');
    launchConfetti(isBad ? ['#e94560','#ff6b6b','#f7971e'] : ['#2ecc71','#ffd200','#3498db']);
  }

  function closeModal() {
    document.getElementById('resultModal').classList.remove('show');
    document.getElementById('confettiContainer').innerHTML = '';
  }

  // ─── 컨페티 ──────────────────────────────────────────────────
  function launchConfetti(colors) {
    const container = document.getElementById('confettiContainer');
    container.innerHTML = '';
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left      = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width     = (6 + Math.random() * 10) + 'px';
      el.style.height    = (6 + Math.random() * 10) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay    = (Math.random() * 0.8) + 's';
      container.appendChild(el);
    }
  }

  // ─── 유틸 ────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 엔터키 지원
  document.getElementById('playerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });
  document.getElementById('penaltyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPenalty();
  });

  // ─── 초기화 ──────────────────────────────────────────────────
  renderPlayers();
  renderPenalties();
  drawWheel();
</script>

</body>
</html>
